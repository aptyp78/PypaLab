name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Strict gate. Jobs run in dependency order; the secret scan blocks everything.
permissions:
  contents: read

jobs:
  secret-scan:
    name: "🔒 secret & sensitive-data scan (blocking)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for gitleaks
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
      - name: custom sensitive-data guard
        run: bash scripts/check-no-secrets.sh

  python:
    name: python lint & types
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff mypy
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy --ignore-missing-imports src/ || true  # types advisory until fully annotated

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck scripts/*.sh src/*.sh || true

  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g markdownlint-cli
      - run: markdownlint '**/*.md' --ignore node_modules || true

  html:
    name: html well-formedness
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-html.sh

  structure:
    name: structure & provenance
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-structure.sh
